spring.application.name=service_logistica
# Puerto independiente para Logistica
server.port=8088

# Conexion a la base de datos db_logistica
spring.datasource.url=jdbc:mysql://localhost:3306/db_logistica?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Creacion automatica de tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true