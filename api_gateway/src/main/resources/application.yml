server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
       
        - id: usuario-service
          uri: http://localhost:808
          predicates:
            - Path=/api/usuarios/**
            
        
        - id: logistica-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/envios/**, /api/proveedores/**